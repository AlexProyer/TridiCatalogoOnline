<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página no encontrada — Tridi</title>
    <meta name="robots" content="noindex">
    <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="assets/favicon/favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="assets/favicon/apple-touch-icon.png">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app-container" id="app-container">
        <div class="not-found-screen">
            <picture>
                <source srcset="assets/logo/tridi-logo.webp" type="image/webp">
                <img src="assets/logo/tridi-logo.png" alt="Tridi" class="logo-icon not-found-icon">
            </picture>
            <h1 class="not-found-title">404</h1>
            <p class="not-found-text">
                No encontramos esta página. Puede que el link esté roto o que
                la página se haya movido.
            </p>
            <a class="btn-primary not-found-btn" href="/">
                Volver al catálogo <i class="fa-solid fa-arrow-right"></i>
            </a>
        </div>
    </div>
</body>
</html>
